<svg viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .header { font-size: 28px; font-weight: bold; fill: #1f77b4; }
      .title { font-size: 20px; font-weight: bold; fill: #2ca02c; }
      .label { font-size: 14px; fill: #333; }
      .box { fill: #e8f4f8; stroke: #1f77b4; stroke-width: 2; }
      .flow-box { fill: #fff4e6; stroke: #ff7f0e; stroke-width: 2; }
      .decision { fill: #f0f0f0; stroke: #d62728; stroke-width: 2; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" class="header">🚀 Task Manager - Project Architecture</text>
  <text x="500" y="70" text-anchor="middle" class="label" font-size="16">Python RL Environment | Docker Containerized</text>

  <!-- Left Side: File Structure -->
  <text x="50" y="120" class="title">📁 Project Files</text>
  
  <rect x="30" y="140" width="380" height="220" class="box"/>
  <text x="45" y="165" class="label" font-weight="bold">Core Logic:</text>
  <text x="50" y="190" class="label">• app.py → Main agent loop</text>
  <text x="50" y="215" class="label">• environment.py → RL environment</text>
  <text x="50" y="240" class="label">• models.py → Pydantic models</text>
  <text x="50" y="265" class="label">• tasks.py → Grading functions</text>
  
  <text x="45" y="295" class="label" font-weight="bold">Configuration:</text>
  <text x="50" y="320" class="label">• Dockerfile → Docker image</text>
  <text x="50" y="345" class="label">• requirements.txt → Dependencies</text>

  <!-- Right Side: Task Properties -->
  <text x="550" y="120" class="title">📊 Task Properties</text>
  
  <rect x="530" y="140" width="420" height="220" class="box"/>
  <text x="545" y="165" class="label" font-weight="bold">Each Task Contains:</text>
  <text x="550" y="190" class="label">🆔 id: 0-4 (unique identifier)</text>
  <text x="550" y="215" class="label">⭐ priority: 1-5 (importance level)</text>
  <text x="550" y="240" class="label">⏰ deadline: 5-15 (time limit)</text>
  <text x="550" y="265" class="label">⚙️  duration: 1-3 (work steps)</text>
  <text x="550" y="290" class="label">✅ completed: boolean flag</text>
  
  <text x="545" y="320" class="label" font-weight="bold">Environment State:</text>
  <text x="550" y="345" class="label">• 5 random tasks initialized</text>

  <!-- Agent Flow -->
  <text x="500" y="410" text-anchor="middle" class="title">🔄 Agent Execution Flow</text>

  <!-- Flow boxes -->
  <rect x="200" y="450" width="600" height="60" class="flow-box" rx="5"/>
  <text x="500" y="485" text-anchor="middle" class="label" font-weight="bold">1️⃣  Initialize TaskManagerEnv with 5 Random Tasks</text>

  <path d="M 500 510 L 500 550" class="arrow"/>

  <rect x="200" y="550" width="600" height="60" class="flow-box" rx="5"/>
  <text x="500" y="585" text-anchor="middle" class="label" font-weight="bold">2️⃣  Find Highest Priority Incomplete Task</text>

  <path d="M 500 610 L 500 650" class="arrow"/>

  <rect x="200" y="650" width="600" height="60" class="flow-box" rx="5"/>
  <text x="500" y="685" text-anchor="middle" class="label" font-weight="bold">3️⃣  Execute Action: Work on Task (duration -= 1)</text>

  <path d="M 500 710 L 500 750" class="arrow"/>

  <rect x="200" y="750" width="600" height="60" class="flow-box" rx="5"/>
  <text x="500" y="780" text-anchor="middle" class="label" font-weight="bold">4️⃣  Calculate Reward</text>
  <text x="500" y="800" text-anchor="middle" class="label" font-size="12">Reward += 1 (progress) or priority×2 (complete)</text>

  <path d="M 500 810 L 500 850" class="arrow"/>

  <rect x="200" y="850" width="600" height="60" class="flow-box" rx="5"/>
  <text x="500" y="885" text-anchor="middle" class="label" font-weight="bold">5️⃣  Check Missed Deadlines</text>
  <text x="500" y="905" text-anchor="middle" class="label" font-size="12">If time > deadline: missed += 1, Reward -= 5</text>

  <path d="M 500 910 L 500 950" class="arrow"/>

  <!-- Decision Diamond -->
  <text x="500" y="990" text-anchor="middle" class="label" font-weight="bold">Time > 20?</text>
  
  <path d="M 500 1000 L 300 1060 L 500 1120 L 700 1060 Z" class="decision"/>

  <path d="M 300 1060 L 100 1060" class="arrow" class="dashed"/>
  <text x="150" y="1050" class="label" font-weight="bold">Yes</text>

  <path d="M 700 1060 L 900 1060" class="arrow"/>
  <text x="800" y="1050" class="label" font-weight="bold">No</text>

  <!-- Final output -->
  <rect x="50" y="1000" width="200" height="80" class="flow-box" rx="5"/>
  <text x="150" y="1025" text-anchor="middle" class="label" font-weight="bold">Final Output</text>
  <text x="150" y="1050" text-anchor="middle" class="label">Total Reward</text>
  <text x="150" y="1070" text-anchor="middle" class="label" font-size="12">(completed - missed)</text>

  <!-- Loop back -->
  <path d="M 900 1060 Q 950 600 700 550" class="arrow dashed"/>

  <!-- Scoring section -->
  <text x="50" y="1140" class="title">🏆 Scoring Formulas</text>
  
  <rect x="30" y="1150" width="300" height="100" class="box"/>
  <text x="45" y="1175" class="label" font-weight="bold">Easy:</text>
  <text x="50" y="1195" class="label" font-size="12">completed / total</text>
  
  <text x="45" y="1220" class="label" font-weight="bold">Medium:</text>
  <text x="50" y="1240" class="label" font-size="12">∑priority(done) / ∑priority(all)</text>

  <rect x="370" y="1150" width="300" height="100" class="box"/>
  <text x="385" y="1175" class="label" font-weight="bold">Hard:</text>
  <text x="390" y="1195" class="label" font-size="12">max(0, completed - missed)</text>
  <text x="390" y="1215" class="label" font-size="12">/ total_tasks</text>

  <rect x="710" y="1150" width="260" height="100" class="box"/>
  <text x="725" y="1175" class="label" font-weight="bold">Strategy:</text>
  <text x="730" y="1195" class="label" font-size="12">Greedy: always pick</text>
  <text x="730" y="1215" class="label" font-size="12">highest priority task</text>
</svg>